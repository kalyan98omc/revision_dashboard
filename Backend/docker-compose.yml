version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  ApexLearn · Local Development Stack
#  Start all services: docker-compose up -d
#  View logs:          docker-compose logs -f api
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: apexlearn_dev
      POSTGRES_USER: apexlearn
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apexlearn -d apexlearn_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Rate limiting, caching, SocketIO pub/sub, Celery broker) ─────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Flask API ────────────────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    command: ["gunicorn", "wsgi:application", "--worker-class", "eventlet", "--workers", "4", "--bind", "0.0.0.0:5000", "--timeout", "120", "--keep-alive", "5", "--log-level", "info", "--access-logfile", "-"]
    env_file: .env
    environment:
      FLASK_APP: app:create_app
      PYTHONPATH: /app
      DATABASE_URL: postgresql://apexlearn:password@postgres:5432/apexlearn_dev
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/2
      SOCKETIO_MESSAGE_QUEUE: redis://redis:6379/0
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery_worker:
    build: .
    restart: unless-stopped
    command: celery -A wsgi.celery worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      FLASK_APP: app:create_app
      PYTHONPATH: /app
      DATABASE_URL: postgresql://apexlearn:password@postgres:5432/apexlearn_dev
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      - api
      - redis

  # ── Celery Beat (Scheduled tasks) ────────────────────────────────────────────
  celery_beat:
    build: .
    restart: unless-stopped
    command: celery -A wsgi.celery beat --loglevel=info --scheduler celery.beat:PersistentScheduler --schedule /tmp/celerybeat-schedule
    env_file: .env
    environment:
      FLASK_APP: app:create_app
      PYTHONPATH: /app
      DATABASE_URL: postgresql://apexlearn:password@postgres:5432/apexlearn_dev
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
    depends_on:
      - redis

  # ── Redis Commander (Dev UI for Redis) ───────────────────────────────────────
  redis_ui:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles: ["dev"]

volumes:
  postgres_data:
  redis_data:
